<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pharmy - הצטרפו לקהילה</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png">

    <!-- Open Graph -->
    <meta property="og:title" content="Pharmy - הצטרפו לקהילה">
    <meta property="og:description" content="הצטרפו לקהילת Pharmy וקבלו גישה לדילים בלעדיים">
    <meta property="og:image" content="/og-image.png">
    <meta property="og:type" content="website">

    <!-- Google Analytics 4 + Google Ads -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-1E4ZDXBPEH"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-1E4ZDXBPEH');
        gtag('config', 'AW-17901784857');
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Heebo', sans-serif; }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #EFA7B0;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .cta-btn {
            display: block;
            padding: 14px 24px;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 700;
            text-decoration: none;
            color: #fff;
            margin-bottom: 10px;
            transition: transform 0.1s, background 0.2s;
            background: #EFA7B0;
        }
        .cta-btn:hover { background: #e89099; }
        .cta-btn:active { transform: scale(0.97); }
        .store-btn {
            display: block;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            text-decoration: none;
            color: #fff;
            margin-bottom: 10px;
            transition: transform 0.1s;
        }
        .store-btn:active { transform: scale(0.97); }
        .btn-ios { background: #000; }
        .btn-android { background: #1b5e20; }
        .invite-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(239, 167, 176, 0.15);
            color: #c97582;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 16px;
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-pink-50 to-green-50 flex items-center justify-center">

    <!-- Campaign redirect state (/join/{slug}) -->
    <div id="campaign-state" style="display:none;" class="text-center p-6 w-full max-w-md">
        <img src="/app-icon.png" alt="Pharmy" class="w-20 h-20 mx-auto mb-5 rounded-2xl shadow-lg">

        <!-- Auto-redirect (attempting to open app) -->
        <div id="campaign-redirect">
            <div class="invite-badge">
                <span>✉️</span>
                <span>הוזמנתם לקהילה</span>
            </div>
            <h1 class="text-2xl font-bold text-gray-800 mb-2">פותחים את Pharmy...</h1>
            <p class="text-gray-500 mb-6">מעבירים אתכם לאפליקציה</p>
            <div class="spinner mx-auto mb-4"></div>
        </div>

        <!-- Fallback (app not installed) -->
        <div id="campaign-fallback" style="display:none;">
            <div class="invite-badge">
                <span>✉️</span>
                <span>הוזמנתם לקהילה ב-Pharmy</span>
            </div>
            <h1 class="text-2xl font-bold text-gray-800 mb-2">הצטרפו עכשיו</h1>
            <p class="text-gray-500 mb-6">הורידו את האפליקציה וקבלו גישה לדילים הבלעדיים</p>

            <a id="open-app-btn" class="cta-btn" href="#">
                פתחו את האפליקציה
            </a>

            <p class="text-gray-400 text-sm mt-4 mb-3">עדיין אין לכם את Pharmy?</p>

            <a id="ios-link" class="store-btn btn-ios" dir="ltr" href="https://apps.apple.com/il/app/pharmy/id6753762155">
                App Store - הורדה מ
            </a>
            <a id="android-link" class="store-btn btn-android" dir="ltr" href="https://play.google.com/store/apps/details?id=com.idankarbat.pharmmate">
                Google Play - הורדה מ
            </a>
        </div>
    </div>

    <!-- Generic 404 state -->
    <div id="generic-404" style="display:none;" class="text-center p-6 w-full max-w-md">
        <img src="/app-icon.png" alt="Pharmy" class="w-20 h-20 mx-auto mb-5 rounded-2xl shadow-lg">
        <h1 class="text-3xl font-bold text-gray-800 mb-2">404</h1>
        <p class="text-gray-500 mb-6">הדף לא נמצא</p>
        <a href="/" class="cta-btn">חזרה לדף הבית</a>
    </div>

    <script>
        (function() {
            var path = window.location.pathname || '';
            var search = window.location.search || '';

            // Check if this is a /join/{slug} path
            var joinMatch = path.match(/^\/join\/([^/?]+)/);

            if (!joinMatch) {
                // Generic 404
                document.getElementById('generic-404').style.display = 'block';
                return;
            }

            var slug = decodeURIComponent(joinMatch[1]);
            var params = new URLSearchParams(search);
            var campaign = params.get('campaign') || '';
            var source = params.get('source') || '';
            var rawClickId = params.get('cid') || params.get('click_id');
            var clickIdNum = rawClickId ? parseInt(rawClickId, 10) : null;
            var clickId = (clickIdNum !== null && !isNaN(clickIdNum)) ? clickIdNum : null;

            // Show campaign redirect UI
            document.getElementById('campaign-state').style.display = 'block';

            // Fire GA event
            try {
                gtag('event', 'campaign_link_fallback', {
                    'slug': slug,
                    'campaign': campaign || 'none',
                    'source': source || 'none'
                });
            } catch (e) {}

            // Phase 1 attribution-improvements (2026-05-11) — helpers for the
            // three new optional fingerprint dimensions. Matches the app-side
            // logic in PharmMateNative/services/deferredAttribution.ts so the
            // backend's NULL-tolerant equality match can tighten when both
            // sides supply non-NULL values.
            function parseDeviceModel(uaStr) {
                if (!uaStr) return null;
                // iPhone / iPad — coarse family detection. The app sends
                // "iPhone 15 Pro" style from expo-device Device.modelName,
                // which the web can't replicate from UA. Coarse match still
                // helps when the web sends "iPhone" and we have a row from a
                // user who clicked but the resolve POST hasn't shipped the
                // model field yet (NULL-tolerant filter).
                var m = uaStr.match(/\biPhone\b/);
                if (m) return 'iPhone';
                m = uaStr.match(/\biPad\b/);
                if (m) return 'iPad';
                // Android — "Linux; Android 14; Pixel 7 Pro Build/..." → "Pixel 7 Pro"
                m = uaStr.match(/Android[^;]*;\s*([^;)]+?)\s+Build\//i);
                if (m) return m[1].trim().substring(0, 64);
                m = uaStr.match(/Android[^;]*;\s*([^;)]+?)[);]/i);
                if (m) return m[1].trim().substring(0, 64);
                return null;
            }
            function computeAccessibilityHash(fontScale, isRTL, reduceMotion) {
                // Deterministic compact hash. Must match
                // PharmMateNative/services/deferredAttribution.ts
                // computeAccessibilityHash for the same logical state.
                // Web can't read system font-scale reliably, so we hardcode
                // 1.0 to match the app's typical default-scale fingerprint.
                var raw = fontScale.toFixed(2) + '|' +
                          (isRTL ? 1 : 0) + '|' +
                          (reduceMotion ? 1 : 0);
                var h = 0;
                for (var i = 0; i < raw.length; i++) {
                    h = ((h << 5) - h) + raw.charCodeAt(i);
                    h |= 0;
                }
                var hex = Math.abs(h).toString(16);
                while (hex.length < 32) hex = '0' + hex;
                return hex.slice(0, 32);
            }
            var fpIsRTL = (document.documentElement.dir || '').toLowerCase() === 'rtl' ||
                          (window.getComputedStyle &&
                           window.getComputedStyle(document.documentElement).direction === 'rtl');
            var fpReduceMotion = (window.matchMedia &&
                                  window.matchMedia('(prefers-reduced-motion: reduce)').matches) || false;

            // Deferred-attribution fingerprint write — fire-and-forget.
            // If the user does not have the app installed yet they will be
            // sent to the App Store, install Pharmy, and on first cold launch
            // the app calls /api/campaign/resolve which matches this same
            // fingerprint to recover the slug. keepalive=true ensures the
            // POST survives the navigation away from this page.
            try {
                var fpBody = {
                    click_id: clickId,
                    community_slug: slug,
                    ua: navigator.userAgent || null,
                    screen: (window.screen && window.screen.width && window.screen.height)
                        ? (window.screen.width + 'x' + window.screen.height) : null,
                    timezone: (window.Intl && Intl.DateTimeFormat)
                        ? Intl.DateTimeFormat().resolvedOptions().timeZone : null,
                    locale: navigator.language || null,
                    // Phase 1 attribution-improvements (2026-05-11) — new optional dims.
                    // Backend uses device_model + screen_density as NULL-tolerant
                    // filters; accessibility_hash is forensic-only (not matched).
                    device_model: parseDeviceModel(navigator.userAgent || ''),
                    screen_density: window.devicePixelRatio || 1,
                    accessibility_hash: computeAccessibilityHash(1.0, fpIsRTL, fpReduceMotion)
                };
                // Backend URL: staging hostname → staging API; everything else → prod.
                // Lets staging mobile builds e2e-test DDA when this page is served
                // from a staging-equivalent hostname (e.g. staging.pharmy.app once
                // it exists). Without this branch every /join click writes to prod
                // and staging resolves can never find the row.
                // QA override: ?fp-target=staging routes the fingerprint POST to
                // the staging backend so an end-to-end test using a staging-pointed
                // mobile build can match against the row this page writes. Without
                // this, hitting pharmy.app/join/X writes the row to prod and a
                // staging APK querying staging will never find it.
                var fpTarget = params.get('fp-target');
                var fpHost = window.location.hostname || '';
                var fpApiBase;
                if (fpTarget === 'staging') {
                    fpApiBase = 'https://pharmmate-api-staging.onrender.com';
                } else if (fpHost === 'staging.pharmy.app' || fpHost.indexOf('staging') === 0) {
                    fpApiBase = 'https://pharmmate-api-staging.onrender.com';
                } else {
                    fpApiBase = 'https://pharmmate-api-production.onrender.com';
                }
                var fpUrl = fpApiBase + '/api/campaign/fingerprint';
                var fpJson = JSON.stringify(fpBody);
                // sendBeacon with text/plain avoids the CORS preflight that iOS Safari
                // drops mid-navigation. Falls back to fetch+keepalive if sendBeacon
                // is unavailable (rare; pre-2017 Safari).
                var sent = false;
                if (navigator.sendBeacon) {
                    try {
                        sent = navigator.sendBeacon(
                            fpUrl,
                            new Blob([fpJson], { type: 'text/plain;charset=UTF-8' })
                        );
                    } catch (_e) { /* fallthrough */ }
                }
                if (!sent) {
                    fetch(fpUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=UTF-8' },
                        body: fpJson,
                        keepalive: true,
                        mode: 'cors',
                        credentials: 'omit'
                    }).catch(function () { /* non-fatal */ });
                }
            } catch (e) {}

            // Build custom-scheme deep link URL
            var qParts = [];
            if (campaign) qParts.push('campaign=' + encodeURIComponent(campaign));
            if (source) qParts.push('source=' + encodeURIComponent(source));
            var queryStr = qParts.length ? '?' + qParts.join('&') : '';
            var customSchemeUrl = 'pharmy://join/' + slug + queryStr;

            // Phase 1 attribution Layer 1 (2026-05-11): rewrite the Android
            // "Google Play" fallback link with ?referrer=campaign=<slug>&click_id=<id>
            // so the Play Install Referrer API surfaces the attribution to
            // the app on first cold launch (~99% reliability on Android).
            // Google Play preserves the referrer string through the install
            // exactly; the app's InstallReferrerModule.kt parses it back.
            // Format: encodeURIComponent("campaign=X&click_id=Y") — the inner
            // ampersand must be encoded so Play stores it as a single ref string.
            try {
                var androidEl = document.getElementById('android-link');
                if (androidEl) {
                    var inner = 'campaign=' + encodeURIComponent(slug);
                    if (clickId !== null) {
                        inner += '&click_id=' + encodeURIComponent(String(clickId));
                    }
                    androidEl.href = 'https://play.google.com/store/apps/details' +
                                     '?id=com.idankarbat.pharmmate' +
                                     '&referrer=' + encodeURIComponent(inner);
                }
            } catch (_e) { /* non-fatal — falls back to the static href */ }

            var ua = navigator.userAgent || '';
            function isIOS() { return /iphone|ipad|ipod/i.test(ua); }
            function isAndroid() { return /android/i.test(ua); }
            function isInAppBrowser() { return /Instagram|FBAN|FBAV|Twitter|Line|Snapchat|TikTok|BytedanceWebview/i.test(ua); }

            var appOpened = false;
            function markOpened() { appOpened = true; }
            document.addEventListener('visibilitychange', function() {
                if (document.hidden) markOpened();
            });
            window.addEventListener('blur', markOpened);
            window.addEventListener('pagehide', markOpened);

            // Try to open the app (only on mobile, not in-app browsers)
            if ((isIOS() || isAndroid()) && !isInAppBrowser()) {
                // Use iframe trick for custom scheme (less intrusive than window.location)
                try {
                    var iframe = document.createElement('iframe');
                    iframe.style.display = 'none';
                    iframe.src = customSchemeUrl;
                    document.body.appendChild(iframe);
                    setTimeout(function() {
                        try { document.body.removeChild(iframe); } catch(e) {}
                    }, 100);
                } catch (e) {}

                // Also try direct navigation as backup
                setTimeout(function() {
                    if (!appOpened) {
                        window.location.href = customSchemeUrl;
                    }
                }, 50);
            }

            // After 2.5s, if still here, show fallback UI
            setTimeout(function() {
                if (appOpened) return;
                document.getElementById('campaign-redirect').style.display = 'none';
                document.getElementById('campaign-fallback').style.display = 'block';
                document.getElementById('open-app-btn').href = customSchemeUrl;
            }, 2500);
        })();
    </script>
</body>
</html>
